# Keep src/pricing/price_map.json current with Anthropic's published rate card.
#
# Runs the pricing updater on a weekly schedule (and on demand). If the live rate
# card differs from the bundled map, it opens a PR into `develop` — never main
# (which is protected and requires review) — and never auto-merges. A human reviews
# the diff and merges.
name: Update price map

on:
  # Weekly, Monday 06:00 UTC. Cron is UTC; adjust if you want a different day/time.
  schedule:
    - cron: "0 6 * * 1"
  # Allow running it by hand from the Actions tab.
  workflow_dispatch:

# The job pushes a branch and opens a PR, so it needs write access to both.
permissions:
  contents: write
  pull-requests: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The updater only needs httpx (no PySide6), so install just that to keep
      # the job fast. Pinned to match requirements.txt.
      - name: Install httpx
        run: python -m pip install "httpx==0.27.2"

      # Run from src/ so `python -m pricing.updater` resolves, matching the
      # project's flat module layout. Default mode fetches the live page, diffs,
      # and rewrites price_map.json only if it changed (printing the diff to the log).
      - name: Run pricing updater
        working-directory: src
        run: python -m pricing.updater

      # Open a PR into develop only if the updater actually changed the file.
      # peter-evans/create-pull-request is a no-op when the tree is clean, so a
      # week with no price changes produces no PR. It does NOT auto-merge.
      - name: Open PR if the price map changed
        uses: peter-evans/create-pull-request@v6
        with:
          base: develop
          branch: chore/update-price-map
          # Keep one rolling PR branch; new runs update it rather than piling up.
          delete-branch: true
          add-paths: src/pricing/price_map.json
          commit-message: "chore(pricing): update price_map.json from rate card"
          title: "chore(pricing): update price map from Anthropic rate card"
          body: |
            Automated update of `src/pricing/price_map.json` from
            https://platform.claude.com/docs/en/about-claude/pricing.md

            Generated by the **Update price map** workflow. Review the diff
            (see the workflow run log for the parsed changes) before merging.

            Do not auto-merge — confirm the new numbers look right first.
          labels: pricing, automated
